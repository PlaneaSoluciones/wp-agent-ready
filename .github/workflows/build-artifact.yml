name: Build artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Create plugin ZIP
        run: |
          mkdir -p dist/wp-agent-ready
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.githooks' --exclude='.claude' \
            --exclude='dist' --exclude='vendor' \
            --exclude='composer.json' --exclude='composer.lock' \
            --exclude='phpcs.xml' --exclude='phpstan.neon' --exclude='phpstan-bootstrap.php' \
            --exclude='.gitignore' --exclude='wp-agent-ready-brief.md' \
            . dist/wp-agent-ready/
          cd dist && zip -r ../wp-agent-ready.zip wp-agent-ready/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-agent-ready-${{ env.SHORT_SHA }}
          path: wp-agent-ready.zip
          retention-days: 30
