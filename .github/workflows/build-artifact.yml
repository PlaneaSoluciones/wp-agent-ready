name: Build artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create plugin ZIP
        run: |
          mkdir -p dist/wp-agent-ready
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='.githooks' --exclude='.claude' \
            --exclude='dist' --exclude='vendor' \
            --exclude='composer.json' --exclude='composer.lock' \
            --exclude='phpcs.xml' --exclude='phpstan.neon' --exclude='phpstan-bootstrap.php' \
            --exclude='.gitignore' --exclude='wp-agent-ready-brief.md' \
            . dist/wp-agent-ready/
          cd dist && zip -r ../wp-agent-ready.zip wp-agent-ready/

      - name: Update dev pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev --yes 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true
          gh release create dev \
            --title "Dev build (${GITHUB_SHA::7})" \
            --notes "Build automático del último commit en \`main\`. No es una release oficial." \
            --prerelease \
            wp-agent-ready.zip
